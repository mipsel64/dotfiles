[theme]
theme = "plain"

[icons]
icons = "material-nf"

[[block]]
block = "net"
format = " $icon {$ip|—} "
format_alt = " $icon {$ssid|wired} {$signal_strength|} {$ip|—} "
interval = 5

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 60
warning = 20.0
alert = 10.0

[[block]]
block = "cpu"
format = " $icon $utilization "
interval = 2
info_cpu = 30
warning_cpu = 70
critical_cpu = 90

[[block]]
block = "memory"
format = " $icon $mem_used_percents "

[[block]]
block = "load"
format = " $icon $1m "
interval = 5

# Left-click: toggle mute. Scroll up/down: adjust volume. Both are defaults.
[[block]]
block = "sound"
step_width = 5
format = " $icon {$volume.eng(w:2)|MUTED} "

[[block]]
block = "time"
format = " $timestamp.datetime(f:'%a %F %T') "
interval = 1
