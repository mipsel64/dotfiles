[theme]
theme = "plain"

[icons]
icons = "material-nf"

[[block]]
block = "net"
format = " $icon {$ip|—} "
format_alt = " $icon {$ssid|wired} {$signal_strength|} {$ip|—} "
interval = 5

[[block]]
block = "custom"
format = " $icon $text.pango-str() "
command = '''
state=$(tailscale status --json 2>/dev/null | awk -F'"' '/"BackendState"/{print $4; exit}')
if [ "$state" = "Running" ]; then
  ip=$(tailscale ip -4 2>/dev/null | head -n1)
  printf "{\"icon\":\"net_vpn\",\"text\":\"<span foreground='#a6e3a1'>%s</span>\"}" "$ip"
else
  printf "{\"icon\":\"net_vpn\",\"text\":\"<span foreground='#808080'>Disconnected</span>\"}"
fi
'''
shell = "sh"
json = true
interval = 5
[[block.click]]
button = "left"
cmd = "tailscale up"
[[block.click]]
button = "right"
cmd = "tailscale down"

[[block]]
block = "disk_space"
path = "/"
info_type = "available"
alert_unit = "GB"
interval = 60
warning = 20.0
alert = 10.0

[[block]]
block = "cpu"
format = " $icon $utilization "
interval = 2
info_cpu = 30
warning_cpu = 70
critical_cpu = 90

[[block]]
block = "memory"
format = " $icon $mem_used_percents "

# Left-click: toggle mute. Scroll up/down: adjust volume. Both are defaults.
[[block]]
block = "sound"
step_width = 5
format = " $icon {$volume.eng(w:2)|MUTED} "

[[block]]
block = "time"
format = " $timestamp.datetime(f:'%a %F %R') "
interval = 60
