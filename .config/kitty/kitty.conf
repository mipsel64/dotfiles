# Shell integration
shell_integration enabled

# Gruvchad theme
color0  #2d2f30
color1  #d97368
color2  #adb46a
color3  #dbbf84
color4  #89ada3
color5  #c68a9c
color6  #91af81
color7  #bdb198
color8  #414344
color9  #d97368
color10 #adb46a
color11 #dbbf84
color12 #89ada3
color13 #c68a9c
color14 #91af81
color15 #c4b89f

background           #1f2122
foreground           #bdb198
selection_background #414344
selection_foreground #c4b89f
cursor               #dbbf84

# BEGIN_KITTY_FONTS
font_family      family='JetBrains Mono' postscript_name=JetBrainsMono-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size   13.0
disable_ligatures always
disable_ligatures always
# END_KITTY_FONTS

# macOS
macos_option_as_alt           left
macos_show_window_title_in    none
macos_traditional_fullscreen  no

# Mouse
mouse_hide_wait 1.0

# Cursor settings
cursor_shape           block
cursor_blink_interval  0.5
shell_integration      enabled no-cursor

# Use cmd+shift as the default modifier for all kitty shortcuts
kitty_mod cmd+shift

# URL detection (Cmd+click on macOS, Ctrl+click on Linux by default)
detect_urls yes

# Smooth scrolling (scrollback buffer)
pixel_scroll            yes
touch_scroll_multiplier 1.0
momentum_scroll         0.96

# Tab navigation (cmd+1..9 jumps to tab N, cmd+0 jumps to the last tab)
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9
map cmd+0 goto_tab -1

# Scrolling keybindings
map page_up         scroll_page_up
map page_down       scroll_page_down
map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down

# Tab bar
tab_bar_edge              top
tab_bar_style             separator
tab_separator             " │ "
tab_bar_min_tabs          2
tab_bar_margin_height     0.0 2.0
tab_bar_margin_color      #414344
tab_title_template        "{fmt.fg._6a6a6a}{title[:16]}{fmt.fg.tab}    {fmt.fg._89ada3}⌘{index}{fmt.fg.tab}"
active_tab_title_template "{fmt.fg._c4b89f}{fmt.bold}{title[:16]}{fmt.nobold}{fmt.fg.tab}    {fmt.fg._dbbf84}⌘{index}{fmt.fg.tab}"

active_tab_foreground   #dbbf84
active_tab_background   #1f2122
active_tab_font_style   bold
inactive_tab_foreground #6a6a6a
inactive_tab_background #1f2122
inactive_tab_font_style normal
tab_bar_background      #1f2122

# Window appearance
window_margin_width         0
window_border_width         0
background_opacity          0.95
background_blur             20
dynamic_background_opacity  yes
