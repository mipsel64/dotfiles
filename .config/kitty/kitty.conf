# Shell integration
shell_integration enabled

# Gruvchad theme
color0  #2d2f30
color1  #d97368
color2  #adb46a
color3  #dbbf84
color4  #89ada3
color5  #c68a9c
color6  #91af81
color7  #bdb198
color8  #414344
color9  #d97368
color10 #adb46a
color11 #dbbf84
color12 #89ada3
color13 #c68a9c
color14 #91af81
color15 #c4b89f

background           #1f2122
foreground           #bdb198
selection_background #414344
selection_foreground #c4b89f
cursor               #dbbf84

# Font settings
font_size   13.0
font_family DejavuSansM Nerd Font
# Disable ligatures / contextual alternates / discretionary ligatures
disable_ligatures always
font_features DejaVuSansMNerdFont-Book -calt -liga -dlig

# macOS
macos_option_as_alt           left
macos_show_window_title_in    none
macos_traditional_fullscreen  no

# Mouse
mouse_hide_wait 1.0

# Cursor settings
cursor_shape           block
cursor_blink_interval  0.5
shell_integration      enabled no-cursor

# URL detection (Cmd+click on macOS, Ctrl+click on Linux by default)
detect_urls yes

# Smooth scrolling (scrollback buffer)
pixel_scroll            yes
touch_scroll_multiplier 1.0
momentum_scroll         0.96

# Scrolling keybindings
map page_up         scroll_page_up
map page_down       scroll_page_down
map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down
