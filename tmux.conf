unbind C-b
set -g prefix C-f
bind C-f send-prefix
unbind z
bind C-g resize-pane -Z


# toggle last window by hitting again C-f
bind-key C-f last-window

#setw -g xterm-keys on
bind -n S-Enter send-keys S-Enter

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on
setw -g aggressive-resize off

# Enable forcus event
set -g focus-events on

set -g allow-passthrough on

# Start windows and pane numbering with index 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# re-number windows when one is closed
set -g renumber-windows on

setw -g monitor-activity on

# copy mode
bind-key -T copy-mode-vi y send-keys -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane


# Show times longer than supposed
set -g display-panes-time 2000

# tmux messages are displayed for 4 seconds
set -g display-time 4000

# tmux-256color instead of screen-256color enables italics
set -g default-terminal "tmux-256color"

# Tc enables true color
set -ag terminal-overrides ",*256col*:colors=256:Tc"

# Ms modifies OSC 52 clipboard handling to work with mosh:
# - mosh drops OSC 52 without an explicit "c" target, so hardcode it
# - tmux >= 3.4 cannot expand Ms strings lacking %p1 (tmux/tmux#4081),
#   so print the (always empty) %p1 param before the payload
set -as terminal-overrides ',*:Ms=\E]52;c;%p1%s%p2%s\a'

# enable OSC 52 clipboard
# https://medium.freecodecamp.org/tmux-in-practice-integration-with-system-clipboard-bcd72c62ff7b
set -g set-clipboard on

# bind -n C-l send-keys -R C-l \; clear-history

# set default command
set -g default-command "${SHELL} -l"

# Split horiziontal and vertical splits, instead of % and "
# Also open them in the same directory
bind-key C-v split-window -h -c '#{pane_current_path}'
bind-key C-s split-window -v -c '#{pane_current_path}'

# Source file
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Scroll with mouse
set -g mouse on

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Lower escape timing from 500ms to 50ms for quicker response to scroll-buffer access.
set -s escape-time 50

bind-key -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

######################
### DESIGN CHANGES ###
######################

# loud or quiet?
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

setw -g mode-keys vi

# selection color
# setw -g mode-style "bg=colour19,fg=white,bold"

set-option -g history-limit 5000

# move panel binding
bind C-h select-pane -L
bind C-j select-pane -D
bind C-k select-pane -U
bind C-l select-pane -R



# Remove SSH_AUTH_SOCK to disable tmux automatically resetting the variable
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID \
                             SSH_CONNECTION WINDOWID XAUTHORITY"

# Use a symlink to look up SSH authentication
setenv -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock

#set inactive/active window styles

set -g status-position bottom
setw -g mode-keys vi

# Status bar colors
set -g status-style "bg=blue,fg=black"

